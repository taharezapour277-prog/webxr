<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>WebXR AR Vertical Board</title>
  <style>
    body { margin:0; overflow:hidden; }
  </style>
</head>
<body>
<script type="module">
  import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
  import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js';
  import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
  camera.position.set(0, 1.6, 2);

  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // نور صحنه
  const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
  light.position.set(0,1,0);
  scene.add(light);

  // بارگذاری مدل تابلو
  const loader = new GLTFLoader();
  let board = null;

  loader.load('tavlo.glb', (gltf) => {
    board = gltf.scene;
    board.scale.set(0.5,0.5,0.5);
    board.visible = false;
    scene.add(board);
  });

  // بررسی پشتیبانی AR
  async function checkAR() {
    if(navigator.xr && await navigator.xr.isSessionSupported('immersive-ar')) {
      // ARButton برای موبایل
      document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures:['hit-test'] }));

      let hitTestSource = null;
      let localSpace = null;

      renderer.xr.addEventListener('sessionstart', async () => {
        const session = renderer.xr.getSession();
        const viewerSpace = await session.requestReferenceSpace('viewer');
        hitTestSource = await session.requestHitTestSource({ space: viewerSpace });
        localSpace = await session.requestReferenceSpace('local');
      });

      renderer.setAnimationLoop((timestamp, frame) => {
        if(frame && hitTestSource && board) {
          const hitTestResults = frame.getHitTestResults(hitTestSource);
          if(hitTestResults.length > 0) {
            const pose = hitTestResults[0].getPose(localSpace);
            if(pose) {
              board.visible = true;
              // قرارگیری روی دیوار (سطح عمودی)
              board.position.set(
                pose.transform.position.x,
                pose.transform.position.y + 1.0, // ارتفاع تابلو
                pose.transform.position.z
              );
              board.rotation.set(-Math.PI/2, camera.rotation.y, 0); // همیشه عمودی
            }
          }
        }
        renderer.render(scene, camera);
      });

    } else {
      // fallback دسکتاپ
      if(board) board.visible = true;
      board.position.set(0,0,0);
      function animateDesktop() {
        if(board) {
          board.rotation.y += 0.01;
          board.rotation.x += 0.005;
        }
        renderer.render(scene, camera);
        requestAnimationFrame(animateDesktop);
      }
      animateDesktop();
    }
  }

  checkAR();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
