<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebXR AR Vertical Board with Fallback</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/jsm/webxr/ARButton.js"></script>
  </head>
  <body style="margin:0; overflow:hidden;">
    <script type="module">
      import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.module.js';
      import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.152.0/examples/jsm/webxr/ARButton.js';

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
      camera.position.z = 1;

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);

      // تابلو / مکعب سه‌بعدی
      const geometry = new THREE.BoxGeometry(0.4, 0.3, 0.03);
      const material = new THREE.MeshBasicMaterial({ color: 0x0088ff });
      const board = new THREE.Mesh(geometry, material);
      scene.add(board);

      // نور ساده برای دسکتاپ
      const light = new THREE.HemisphereLight(0xffffff, 0x444444);
      light.position.set(0,1,0);
      scene.add(light);

      // بررسی پشتیبانی WebXR
      if (navigator.xr) {
        // ARButton برای موبایل
        document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

        let hitTestSource = null;
        let localSpace = null;

        renderer.xr.addEventListener("sessionstart", async () => {
          const session = renderer.xr.getSession();
          const viewerSpace = await session.requestReferenceSpace("viewer");
          hitTestSource = await session.requestHitTestSource({ space: viewerSpace });
          localSpace = await session.requestReferenceSpace("local");
        });

        renderer.setAnimationLoop((timestamp, frame) => {
          if (frame && hitTestSource) {
            const hitTestResults = frame.getHitTestResults(hitTestSource);
            if (hitTestResults.length > 0) {
              const pose = hitTestResults[0].getPose(localSpace);
              if (pose) {
                board.visible = true;
                board.position.set(
                  pose.transform.position.x,
                  pose.transform.position.y + 0.5,
                  pose.transform.position.z
                );
                board.rotation.set(0, camera.rotation.y, 0);
              }
            }
          }
          renderer.render(scene, camera);
        });

      } else {
        // fallback دسکتاپ: تابلو همیشه وسط صفحه و چرخشی
        board.position.set(0,0,0);
        board.rotation.set(0,0,0);
        function animateDesktop() {
          board.rotation.y += 0.01;
          board.rotation.x += 0.005;
          renderer.render(scene, camera);
          requestAnimationFrame(animateDesktop);
        }
        animateDesktop();
      }

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
