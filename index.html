<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>AR تابلو روی دیوار</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    model-viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <!-- جای model.glb و model.usdz رو با فایل‌های خودت عوض کن -->
  <model-viewer
    src="model.glb"
    ios-src="model.usdz"
    alt="تابلوی سه‌بعدی"
    ar
    ar-modes="scene-viewer quick-look webxr"
    camera-controls
    shadow-intensity="0"
    exposure="1"
    style="width: 100%; height: 100%;">
  </model-viewer>
</body>
</html>
